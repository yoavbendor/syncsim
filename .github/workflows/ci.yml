name: sim-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build simulator image (OMNeT++ + INET)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: syncsim:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Minimal scenario (M1 smoke)
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            bash scripts/run.sh General simulations/minimal.ini results

      - name: Export + analyze telemetry
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            python3 scripts/analyze.py results --strict

      - name: Archive Minimal results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minimal-results
          path: results/

      - name: Run Nominal scenario (M2 multi-hop)
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            bash scripts/run.sh General simulations/nominal.ini results-nominal

      - name: Export + analyze nominal telemetry
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            python3 scripts/analyze.py results-nominal --strict

      - name: Archive Nominal results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nominal-results
          path: results-nominal/

      - name: Run Congestion scenario (M3 finite queues + background traffic)
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            bash scripts/run.sh General simulations/congestion.ini results-congestion

      - name: Export + analyze congestion telemetry
        # Strict, like the other scenarios: gates on model-correctness sanity
        # (signals present, no NaN/Inf, no unbounded divergence), never on
        # sync-quality magnitude -- a harsh scenario producing a large but
        # bounded, recovering offset is a real result to study, not a failure.
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            python3 scripts/analyze.py results-congestion --strict

      - name: Archive Congestion results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: congestion-results
          path: results-congestion/

      - name: Run Feedback scenario (M4 clock-driven burst traffic)
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            bash scripts/run.sh General simulations/feedback.ini results-feedback

      - name: Export + analyze feedback telemetry
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            python3 scripts/analyze.py results-feedback --strict

      - name: Archive Feedback results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feedback-results
          path: results-feedback/

      - name: Run Sweep scenario (M5 queue-capacity parameter sweep)
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            bash scripts/run_sweep.sh General simulations/sweep.ini results-sweep

      - name: Summarize sweep
        # Informational, not gated by analyze.py's --strict: analyze.py's
        # sanity check assumes one module path maps to one series, which a
        # multi-iteration sweep result dir violates (the same module path
        # repeats once per iteration). summarize_sweep.py is the sweep's own
        # comparison report; per-iteration model-correctness isn't re-checked
        # here -- a real scope boundary, not an oversight.
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            python3 scripts/summarize_sweep.py results-sweep --var cap

      - name: Archive Sweep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-results
          path: results-sweep/
