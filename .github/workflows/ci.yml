name: sim-ci

on:
  push:
  pull_request:
  workflow_dispatch:

# Pages deploy needs these; the rest of the job only reads.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build simulator image (OMNeT++ + INET)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: syncsim:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Minimal scenario (M1 smoke)
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            bash scripts/run.sh General simulations/minimal.ini results

      - name: Export + analyze telemetry
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            python3 scripts/analyze.py results --strict

      - name: Archive Minimal results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minimal-results
          path: results/

      - name: Run Nominal scenario (M2 multi-hop)
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            bash scripts/run.sh General simulations/nominal.ini results-nominal

      - name: Export + analyze nominal telemetry
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            python3 scripts/analyze.py results-nominal --strict

      - name: Archive Nominal results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nominal-results
          path: results-nominal/

      - name: Run Congestion scenario (M3 finite queues + background traffic)
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            bash scripts/run.sh General simulations/congestion.ini results-congestion

      - name: Export + analyze congestion telemetry
        # Strict, like the other scenarios: gates on model-correctness sanity
        # (signals present, no NaN/Inf, no unbounded divergence), never on
        # sync-quality magnitude -- a harsh scenario producing a large but
        # bounded, recovering offset is a real result to study, not a failure.
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            python3 scripts/analyze.py results-congestion --strict

      - name: Archive Congestion results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: congestion-results
          path: results-congestion/

      - name: Run Feedback scenario (M4 clock-driven burst traffic)
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            bash scripts/run.sh General simulations/feedback.ini results-feedback

      - name: Export + analyze feedback telemetry
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            python3 scripts/analyze.py results-feedback --strict

      - name: Archive Feedback results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feedback-results
          path: results-feedback/

      - name: Run Sweep scenario (M5 queue-capacity parameter sweep)
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            bash scripts/run_sweep.sh General simulations/sweep.ini results-sweep

      - name: Summarize sweep
        # Informational, not gated by analyze.py's --strict: analyze.py's
        # sanity check assumes one module path maps to one series, which a
        # multi-iteration sweep result dir violates (the same module path
        # repeats once per iteration). summarize_sweep.py is the sweep's own
        # comparison report; per-iteration model-correctness isn't re-checked
        # here -- a real scope boundary, not an oversight.
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            python3 scripts/summarize_sweep.py results-sweep --var cap

      - name: Archive Sweep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-results
          path: results-sweep/

      # ---- Phase B: YAML topology DSL de-risk check ----
      # configs/topology/*.yaml is the new single source of truth for network
      # structure/clock-drift/gPTP roles; scripts/gen_topology.py derives the
      # .ned + .ini lever fragment from it. Before switching any scenario over
      # to generated files, prove the generator reproduces the exact same
      # deterministic simulation as the hand-written minimal.ned/nominal.ned:
      # generate into a separate NED root (simulations_gen/, avoiding a
      # duplicate-network-type clash with the hand-written files still in
      # simulations/), run both networks, and diff every vector/scalar value
      # against the M1/M2 runs already archived above.
      - name: Generate topology from YAML (Phase B)
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci bash -lc '
            set -e
            mkdir -p simulations_gen
            python3 scripts/gen_topology.py configs/topology/minimal.yaml --out-ned simulations_gen/Minimal.ned --out-ini simulations_gen/minimal.gen.ini
            python3 scripts/gen_topology.py configs/topology/nominal.yaml --out-ned simulations_gen/Nominal.ned --out-ini simulations_gen/nominal.gen.ini
          '

      - name: Run generated Minimal + Nominal networks
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci bash -lc '
            set -e
            mkdir -p results-gen-minimal results-gen-nominal
            RD1="$(cd results-gen-minimal && pwd)"
            RD2="$(cd results-gen-nominal && pwd)"
            opp_run -l "$INET_ROOT/src/INET" -n "$INET_ROOT/src:simulations_gen" -u Cmdenv -c General -r 0 \
              --result-dir="$RD1" --cmdenv-express-mode=true --cmdenv-status-frequency=10s simulations_gen/minimal.gen.ini
            opp_run -l "$INET_ROOT/src/INET" -n "$INET_ROOT/src:simulations_gen" -u Cmdenv -c General -r 0 \
              --result-dir="$RD2" --cmdenv-express-mode=true --cmdenv-status-frequency=10s simulations_gen/nominal.gen.ini
          '

      - name: Verify generated networks are bit-for-bit equivalent to hand-written
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci bash -lc '
            set -e
            python3 scripts/verify_topology_equivalence.py results results-gen-minimal
            python3 scripts/verify_topology_equivalence.py results-nominal results-gen-nominal
          '

      - name: Archive generated-network results (Phase B debug aid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-topology-results
          path: |
            simulations_gen/
            results-gen-minimal/
            results-gen-nominal/

      # ---- C1: pcap capture + replay round-trip (opt-in capability, not gated by --strict) ----
      # Not part of the M1-M5 sanity gate: this proves the capture/replay round-trip
      # actually works end-to-end (capture a real pcap, then replay it back in as a
      # traffic source), it isn't a scenario whose sync/congestion dynamics matter.
      # --sim-time-limit is passed on the opp_run command line (via run.sh's
      # EXTRA_OPP_RUN_ARGS), not left to the ini files: an ini-level override
      # after `include congestion.ini`/`include nominal.ini` did not take
      # effect (confirmed empirically in CI -- see pcap_capture.ini's note).
      - name: Capture pcap from Congestion scenario
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            bash scripts/run.sh General simulations/pcap_capture.ini results-pcap-capture --sim-time-limit=0.5s

      - name: Replay captured pcap back into a scenario
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            bash scripts/run.sh General simulations/pcap_replay.ini results-pcap-replay --sim-time-limit=5s

      - name: Verify capture is non-empty and replay actually delivered packets
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci bash -lc '
            set -e
            test -s results-pcap-capture/coreClient.pcap
            echo "capture OK: $(stat -c%s results-pcap-capture/coreClient.pcap) bytes"
            python3 scripts/check_pcap_replay.py results-pcap-replay
          '

      - name: Archive pcap capture + replay results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pcap-capture-replay
          path: |
            results-pcap-capture/
            results-pcap-replay/

      # ---- Phase A: visual report -> GitHub Pages ----
      # All result dirs (results, results-nominal, ...) persist in the workspace
      # across steps, so one step turns them all into site/index.html.
      - name: Build visual report (site/)
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci bash -lc '
            set -e
            python3 scripts/plot_results.py --result-dir results            --slug m1-minimal    --title "M1 - Minimal (2 clients)"       --network Minimal --ini simulations/minimal.ini    --site site
            python3 scripts/plot_results.py --result-dir results-nominal    --slug m2-nominal    --title "M2 - Multi-hop (17 devices)"    --network Nominal --ini simulations/nominal.ini    --site site
            python3 scripts/plot_results.py --result-dir results-congestion --slug m3-congestion --title "M3 - Sustained congestion"      --network Nominal --ini simulations/congestion.ini --site site
            python3 scripts/plot_results.py --result-dir results-feedback   --slug m4-feedback   --title "M4 - Clock-aligned bursts"      --network Nominal --ini simulations/feedback.ini   --site site
            python3 scripts/plot_results.py --result-dir results-sweep      --slug m5-sweep      --title "M5 - Buffer-size sweep"         --network Nominal --ini simulations/sweep.ini      --site site --kind sweep
            python3 scripts/build_site.py --site site
          '

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/claude/sync-simulation-tool-p6ade4'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/claude/sync-simulation-tool-p6ade4'
        id: deployment
        uses: actions/deploy-pages@v4
