name: sim-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build simulator image (OMNeT++ + INET)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: syncsim:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Minimal scenario (M1 smoke)
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            bash scripts/run.sh General simulations/minimal.ini results

      - name: Export + analyze telemetry
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            python3 scripts/analyze.py results --max-offset-us 200 --strict

      - name: Archive Minimal results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minimal-results
          path: results/

      - name: Run Nominal scenario (M2 multi-hop)
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            bash scripts/run.sh General simulations/nominal.ini results-nominal

      - name: Export + analyze nominal telemetry
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            python3 scripts/analyze.py results-nominal --max-offset-us 200 --strict

      - name: Archive Nominal results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nominal-results
          path: results-nominal/

      - name: Run Congestion scenario (M3 finite queues + background traffic)
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            bash scripts/run.sh General simulations/congestion.ini results-congestion

      - name: Export + analyze congestion telemetry
        # Non-blocking until real drop/backlog numbers are observed and a
        # convergence threshold is tuned (same bootstrap workflow M1/M2 used).
        continue-on-error: true
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" syncsim:ci \
            python3 scripts/analyze.py results-congestion --max-offset-us 2000

      - name: Archive Congestion results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: congestion-results
          path: results-congestion/
