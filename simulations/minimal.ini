# M1: minimal gPTP sync scenario.
# Demonstrates that INET synchronizes *independent* clocks hop-by-hop over gPTP,
# unlike a netns/namespace approach where every node shares one host clock.

[General]
network = Minimal
sim-time-limit = 60s
# INET 4.6+ reimplemented the clock model with fs-precision arithmetic and
# made the oscillator's nominal tick interval mandatory (no default) --
# confirmed against INET's own showcases/tsn/timesynchronization/gptp
# reference config, which pairs the two settings below.
simtime-resolution = fs

# --- Enable gPTP time synchronization on every node ---
*.*.hasTimeSynchronization = true

# --- Independent clocks: each node has its own oscillator with a distinct drift ---
# ConstantDriftOscillator = fixed crystal error (deterministic). Swap to
# RandomDriftOscillator (see scenarios/) for a wandering drift.
**.clock.oscillator.typename = "ConstantDriftOscillator"
**.clock.oscillator.nominalTickLength = 10ns
*.gm.clock.oscillator.driftRate      = 0ppm     # GM is the reference
*.sw.clock.oscillator.driftRate      = 80ppm    # bridge clock drifts too
*.client1.clock.oscillator.driftRate = 200ppm
*.client2.clock.oscillator.driftRate = -350ppm

# --- gPTP roles: master ports are declared; every unlisted port is a slave ---
*.gm.gptp.masterPorts = ["eth0"]
*.sw.gptp.masterPorts = ["eth1", "eth2"]
# clients: no master ports -> pure slaves (default)

# --- Link speed ---
*.*.eth[*].bitrate = 100Mbps

# --- Measurement ---
# Reference every clock to the GM so post-run analysis can compute offset-from-GM.
**.referenceClock = "gm.clock"

# Record clock time as a vector so scripts/analyze.py can derive per-node offset.
# NOTE (verification point): the exact recordable clock signal name is confirmed on
# the first CI build; analyze.py discovers and lists available signals defensively.
**.clock.timeChanged.result-recording-modes = +vector
**.vector-recording = true
