# M3: TSN switch realism. Reuses the Nominal multi-hop topology (nominal.ned)
# but gives every switch port a *finite, real-dropping* egress queue and adds
# background UDP data traffic from one client per zone converging on
# coreClient through the single swCore<->coreClient 100Mbps link -- a
# guaranteed, moderate oversubscription (3 x ~50Mbps senders on one 100Mbps
# link) so drops are real, not contrived.
#
# INET's default queue (PacketQueue) is UNBOUNDED and raises an error if a
# capacity is set without a drop policy. DropTailQueue is the confirmed real
# idiom (inet/src/inet/queueing/queue/DropTailQueue.ned): packetCapacity with
# PacketAtCollectionEndDropper already wired in.

[General]
network = Nominal
sim-time-limit = 60s

*.*.hasTimeSynchronization = true

# --- Independent clocks: every node (including switches) drifts differently ---
**.clock.oscillator.typename = "ConstantDriftOscillator"
*.gm.clock.oscillator.driftRate = 0ppm
*.swCore.clock.oscillator.driftRate = 50ppm
*.swA.clock.oscillator.driftRate = 80ppm
*.swB.clock.oscillator.driftRate = -60ppm
*.swC.clock.oscillator.driftRate = 100ppm
*.coreClient.clock.oscillator.driftRate = 150ppm
*.clientsA[*].clock.oscillator.driftRate = uniform(-200ppm, 200ppm)
*.clientsB[*].clock.oscillator.driftRate = uniform(-200ppm, 200ppm)
*.clientsC[*].clock.oscillator.driftRate = uniform(-200ppm, 200ppm)

# --- gPTP roles: master ports declared; every unlisted port is a slave ---
*.gm.gptp.masterPorts = ["eth0"]
*.swCore.gptp.masterPorts = ["eth1", "eth2", "eth3", "eth4"]
*.swA.gptp.masterPorts = ["eth1", "eth2", "eth3", "eth4"]
*.swB.gptp.masterPorts = ["eth1", "eth2", "eth3", "eth4"]
*.swC.gptp.masterPorts = ["eth1", "eth2", "eth3", "eth4"]

*.*.eth[*].bitrate = 100Mbps

# --- Measurement / recording policy ---
# Recording policy: background data-plane traffic generates per-packet
# vectors at high volume under load (this produced artifacts up to 4.7GB
# before this policy was fixed) and none of it is needed -- only its
# aggregate descriptors (Mbps/pps/drop-ppm, derived by analyze.py from
# cheap scalars) matter. gPTP, clock, and queue-backlog signals are the
# actual subject of study and stay fully recorded via the unmodified default
# (**.vector-recording = true, never overridden here).
#
# Two earlier attempts at this got the mechanism wrong (confirmed against
# OMNeT++'s manual, doc/src/manual/ch-ana-sim.tex): module-path wildcards
# like "eth[*].**.vector-recording" are NOT how per-statistic recording is
# scoped, and mixing the vector-recording boolean with result-recording-modes
# on the same statistic produces undefined/empty results. The manual's own
# confirmed mechanism is result-recording-modes keyed BY STATISTIC NAME
# (matches regardless of module path): no prefix REPLACES the mode set,
# +/- MODIFIES it. So: keep the cheap "sum"/"count" aggregate for
# length/packet-count stats (analyze.py's Mbps/pps/drop-ppm needs them),
# drop pure per-packet telemetry with no aggregate we use entirely ("-").
# gptp.timeDifference/peerDelay/rateRatio, clock.timeChanged, and
# queueLength/queueBitLength are never named below, so they keep recording
# via the untouched global default -- exactly as in the already-proven M1/M2
# configs.
**.referenceClock = "gm.clock"
**.vector-recording = true
**.clock.timeChanged.result-recording-modes = +vector
**.incomingPacketLengths.result-recording-modes = sum
**.outgoingPacketLengths.result-recording-modes = sum
**.droppedPacketLengths.result-recording-modes = sum
**.droppedPacketLengthsQueueOverflow.result-recording-modes = sum
**.incomingPackets.result-recording-modes = count
**.outgoingPackets.result-recording-modes = count
**.droppedPacketsQueueOverflow.result-recording-modes = count
**.passedUpPk.result-recording-modes = count
**.droppedPkBadChecksum.result-recording-modes = count
**.droppedPkWrongPort.result-recording-modes = count
**.packetSent.result-recording-modes = count
**.packetReceived.result-recording-modes = count
**.dataRate.result-recording-modes = -
**.droppedDataRate.result-recording-modes = -
**.incomingDataRate.result-recording-modes = -
**.outgoingDataRate.result-recording-modes = -
**.interpacketGap.result-recording-modes = -
**.packetJitter.result-recording-modes = -
**.packetDelayVariation.result-recording-modes = -
**.packetDelayDifferenceToMean.result-recording-modes = -
**.meanBitLifeTimePerPacket.result-recording-modes = -
**.queueingTime.result-recording-modes = -
**.throughput.result-recording-modes = -
**.transmissionTime.result-recording-modes = -
**.transmitting.result-recording-modes = -
**.utilization.result-recording-modes = -
**.receptionTime.result-recording-modes = -
**.localTime.result-recording-modes = -

# --- M3: finite, real-dropping egress queues on every switch port ---
*.sw*.eth[*].macLayer.queue.typename = "DropTailQueue"
*.sw*.eth[*].macLayer.queue.packetCapacity = 10

# --- M3: background UDP data traffic converging on coreClient ---
# One sender per zone: 3 senders x ~50Mbps = ~150Mbps offered against the
# single 100Mbps swCore<->coreClient link -- guaranteed oversubscription.
*.clientsA[0].numApps = 1
*.clientsA[0].app[0].typename = "UdpSourceApp"
*.clientsA[0].app[0].io.destAddress = "coreClient"
*.clientsA[0].app[0].io.destPort = 2000
*.clientsA[0].app[0].source.packetLength = 1000B - 54B
*.clientsA[0].app[0].source.productionInterval = exponential(160us)

*.clientsB[0].numApps = 1
*.clientsB[0].app[0].typename = "UdpSourceApp"
*.clientsB[0].app[0].io.destAddress = "coreClient"
*.clientsB[0].app[0].io.destPort = 2001
*.clientsB[0].app[0].source.packetLength = 1000B - 54B
*.clientsB[0].app[0].source.productionInterval = exponential(160us)

*.clientsC[0].numApps = 1
*.clientsC[0].app[0].typename = "UdpSourceApp"
*.clientsC[0].app[0].io.destAddress = "coreClient"
*.clientsC[0].app[0].io.destPort = 2002
*.clientsC[0].app[0].source.packetLength = 1000B - 54B
*.clientsC[0].app[0].source.productionInterval = exponential(160us)

*.coreClient.numApps = 3
*.coreClient.app[0].typename = "UdpSinkApp"
*.coreClient.app[0].io.localPort = 2000
*.coreClient.app[1].typename = "UdpSinkApp"
*.coreClient.app[1].io.localPort = 2001
*.coreClient.app[2].typename = "UdpSinkApp"
*.coreClient.app[2].io.localPort = 2002
