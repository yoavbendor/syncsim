# M4: emergent sync <-> congestion feedback loop. Reuses the Nominal
# multi-hop topology and M3's proven finite-queue + recording-policy blocks,
# but replaces M3's independent-phase background traffic with frame-aligned
# bursts from ALL 12 zone clients, each timed by ITS OWN synced clock:
#
#   *.app[0].source.clockModule = "^.^.clock"   -- schedule using the node's
#     own (gPTP-disciplined) clock, not simulation time.
#   *.app[0].source.scheduleForAbsoluteTime = true  -- if the clock is
#     stepped/slewed by gPTP, the event's simulation-time is recomputed to
#     match, so burst timing genuinely tracks sync quality (confirmed in
#     inet/src/inet/queueing/source/ActivePacketSource.ned; no custom C++
#     needed -- contrary to the original plan's assumption).
#
# Every client uses the IDENTICAL productionInterval/offset; if gPTP has
# synced them well, their clocks agree on "now" and bursts collide. Whether
# this actually closes into a self-sustaining oscillation (congestion degrades
# sync -> bursts desync -> congestion relaxes -> resync -> collide again) is
# the open research question this scenario exists to answer -- report
# whatever the real data shows, not the hypothesis.
#
# First attempt used 1400B (single-packet, no fragmentation) frames: the
# mechanism worked (clockModule/scheduleForAbsoluteTime accepted, sanity
# passed) but there was zero measurable effect -- offsets identical to the
# no-traffic baseline, zero drops. A 12-packet simultaneous burst against a
# 20-packet queue can never overflow. What matters for a microburst effect
# isn't average bandwidth (sustained 1.35Mbps was trivial for a 100Mbps
# link) -- it's whether a single synchronized instant's packet count can
# exceed queue depth. 20000B frames fragment into ~15 IP packets each, so
# 12 aligned clients can present ~180 simultaneous packets against a
# 20-packet queue -- the regime the original brief actually described
# (synchronized senders creating instantaneous microbursts that overwhelm
# buffers, independent of sustained throughput).

[General]
network = Nominal
sim-time-limit = 60s

*.*.hasTimeSynchronization = true

# --- Independent clocks: every node (including switches) drifts differently ---
**.clock.oscillator.typename = "ConstantDriftOscillator"
*.gm.clock.oscillator.driftRate = 0ppm
*.swCore.clock.oscillator.driftRate = 50ppm
*.swA.clock.oscillator.driftRate = 80ppm
*.swB.clock.oscillator.driftRate = -60ppm
*.swC.clock.oscillator.driftRate = 100ppm
*.coreClient.clock.oscillator.driftRate = 150ppm
*.clientsA[*].clock.oscillator.driftRate = uniform(-200ppm, 200ppm)
*.clientsB[*].clock.oscillator.driftRate = uniform(-200ppm, 200ppm)
*.clientsC[*].clock.oscillator.driftRate = uniform(-200ppm, 200ppm)

# --- gPTP roles: master ports declared; every unlisted port is a slave ---
*.gm.gptp.masterPorts = ["eth0"]
*.swCore.gptp.masterPorts = ["eth1", "eth2", "eth3", "eth4"]
*.swA.gptp.masterPorts = ["eth1", "eth2", "eth3", "eth4"]
*.swB.gptp.masterPorts = ["eth1", "eth2", "eth3", "eth4"]
*.swC.gptp.masterPorts = ["eth1", "eth2", "eth3", "eth4"]

*.*.eth[*].bitrate = 100Mbps

# --- Measurement / recording policy (proven in M3; see congestion.ini for
# the full rationale and the two failed mechanisms this avoids) ---
**.referenceClock = "gm.clock"
**.vector-recording = true
**.clock.timeChanged.result-recording-modes = +vector
**.incomingPacketLengths.result-recording-modes = sum
**.outgoingPacketLengths.result-recording-modes = sum
**.droppedPacketLengths.result-recording-modes = sum
**.droppedPacketLengthsQueueOverflow.result-recording-modes = sum
**.incomingPackets.result-recording-modes = count
**.outgoingPackets.result-recording-modes = count
**.droppedPacketsQueueOverflow.result-recording-modes = count
**.passedUpPk.result-recording-modes = count
**.droppedPkBadChecksum.result-recording-modes = count
**.droppedPkWrongPort.result-recording-modes = count
**.packetSent.result-recording-modes = count
**.packetReceived.result-recording-modes = count
**.dataRate.result-recording-modes = -
**.droppedDataRate.result-recording-modes = -
**.incomingDataRate.result-recording-modes = -
**.outgoingDataRate.result-recording-modes = -
**.interpacketGap.result-recording-modes = -
**.packetJitter.result-recording-modes = -
**.packetDelayVariation.result-recording-modes = -
**.packetDelayDifferenceToMean.result-recording-modes = -
**.meanBitLifeTimePerPacket.result-recording-modes = -
**.queueingTime.result-recording-modes = -
**.throughput.result-recording-modes = -
**.transmissionTime.result-recording-modes = -
**.transmitting.result-recording-modes = -
**.utilization.result-recording-modes = -
**.receptionTime.result-recording-modes = -
**.localTime.result-recording-modes = -
**.packetLengths.result-recording-modes = -

# --- M4: finite, real-dropping egress queues on every switch port ---
# Larger capacity than M3's deliberately tiny 10 -- M3 stress-tested "does a
# finite queue drop for real"; M4 wants sustained-misalignment-driven
# overload to matter, not incidental single-frame fragmentation overflow.
*.sw*.eth[*].macLayer.queue.typename = "DropTailQueue"
*.sw*.eth[*].macLayer.queue.packetCapacity = 20

# --- M4: clock-aligned "frame" bursts from every zone client ---
# 10fps, ~1 Ethernet-MTU frame each, converging on coreClient through the
# same shared swCore<->coreClient bottleneck M3 already proved congests.
# All clients share identical timing parameters -- any alignment among
# them must emerge from gPTP sync, not be hand-scripted per client.
*.clientsA[*].numApps = 1
*.clientsA[*].app[0].typename = "UdpSourceApp"
*.clientsA[*].app[0].io.destAddress = "coreClient"
*.clientsA[*].app[0].io.destPort = 9000
*.clientsA[*].app[0].source.packetLength = 20000B - 54B
*.clientsA[*].app[0].source.productionInterval = 100ms
*.clientsA[*].app[0].source.initialProductionOffset = 0s
*.clientsA[*].app[0].source.clockModule = "^.^.clock"
*.clientsA[*].app[0].source.scheduleForAbsoluteTime = true

*.clientsB[*].numApps = 1
*.clientsB[*].app[0].typename = "UdpSourceApp"
*.clientsB[*].app[0].io.destAddress = "coreClient"
*.clientsB[*].app[0].io.destPort = 9000
*.clientsB[*].app[0].source.packetLength = 20000B - 54B
*.clientsB[*].app[0].source.productionInterval = 100ms
*.clientsB[*].app[0].source.initialProductionOffset = 0s
*.clientsB[*].app[0].source.clockModule = "^.^.clock"
*.clientsB[*].app[0].source.scheduleForAbsoluteTime = true

*.clientsC[*].numApps = 1
*.clientsC[*].app[0].typename = "UdpSourceApp"
*.clientsC[*].app[0].io.destAddress = "coreClient"
*.clientsC[*].app[0].io.destPort = 9000
*.clientsC[*].app[0].source.packetLength = 20000B - 54B
*.clientsC[*].app[0].source.productionInterval = 100ms
*.clientsC[*].app[0].source.initialProductionOffset = 0s
*.clientsC[*].app[0].source.clockModule = "^.^.clock"
*.clientsC[*].app[0].source.scheduleForAbsoluteTime = true

*.coreClient.numApps = 1
*.coreClient.app[0].typename = "UdpSinkApp"
*.coreClient.app[0].io.localPort = 9000
