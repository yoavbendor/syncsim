# Optional pcap(ng) packet capture, opt-in only: reuses M3's congestion topology
# (real background UDP traffic converging on coreClient) but turns on INET's
# built-in PcapRecorder (every TsnDevice/TsnSwitch/TsnClock already has a
# recordPcap/pcapRecorder[] slot via LinkLayerNodeBase -- no custom module
# needed) on coreClient's link, for packet-level debugging with Wireshark/
# tcpdump-compatible tooling. Not part of the M1-M5 CI gate and not wired into
# any scenario by default: the project's recording policy (congestion.ini)
# deliberately keeps data-plane traffic to aggregate scalars, and full packet
# capture of every run would reintroduce the exact artifact-bloat problem
# that policy exists to avoid. Run this explicitly when packet-level
# inspection is actually needed.
#
# sim-time-limit is deliberately short (5s, not 60s) to keep the capture file
# small -- this is a debugging aid, not a scenario whose sync/congestion
# dynamics are being studied.

[General]
include congestion.ini
sim-time-limit = 5s

*.coreClient.recordPcap = true
*.coreClient.pcapRecorder[*].fileFormat = "pcapng"
*.coreClient.pcapRecorder[*].pcapFile = "${resultdir}/coreClient.pcapng"
