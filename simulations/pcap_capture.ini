# Optional pcap(ng) packet capture, opt-in only: reuses M3's congestion topology
# (real background UDP traffic converging on coreClient) but turns on INET's
# built-in PcapRecorder (every TsnDevice/TsnSwitch/TsnClock already has a
# recordPcap/pcapRecorder[] slot via LinkLayerNodeBase -- no custom module
# needed) on coreClient's link, for packet-level debugging with Wireshark/
# tcpdump-compatible tooling. Not part of the M1-M5 CI gate and not wired into
# any scenario by default: the project's recording policy (congestion.ini)
# deliberately keeps data-plane traffic to aggregate scalars, and full packet
# capture of every run would reintroduce the exact artifact-bloat problem
# that policy exists to avoid. Run this explicitly when packet-level
# inspection is actually needed.
#
# Capture window must be kept very short to keep the file small -- this is a
# debugging aid, not a scenario whose sync/congestion dynamics are being
# studied. First attempt at the full 5s/60s produced a ~768MB pcap from
# congestion.ini's 3 senders (~18.75k pkt/s combined converging on
# coreClient) -- exactly the artifact-bloat problem the recording policy
# exists to avoid, even though this is opt-in. No snaplen truncation: a
# truncated frame replayed via PcapFilePacketProducer hits "Returning an
# incomplete chunk is not allowed" deep in the IPv4 layer -- confirmed
# empirically in CI -- so full frames are required for the round-trip to
# work, and the short time window alone keeps the file a reasonable size.
#
# IMPORTANT: sim-time-limit is NOT set here. Setting it in this file (after
# `include congestion.ini`, which itself sets 60s) did not override it --
# confirmed empirically in CI (still ran the full t=60s). Pass
# --sim-time-limit=0.5s on the opp_run command line instead (see run.sh's
# EXTRA_OPP_RUN_ARGS / ci.yml), which always wins over ini-file values.
#
# fileFormat is plain "pcap" (not "pcapng"): PcapRecorder can write both, but
# PcapFilePacketProducer (used for replay) errored "Unknown fileheader" on a
# pcapng file -- confirmed empirically in CI -- so pcap is the format that
# actually round-trips with the modules this project uses.

[General]
include congestion.ini

# PcapRecorder serializes real frame bytes, but INET's default checksum mode
# is "declared" (a boolean valid/invalid flag, no bytes actually computed --
# faster for scenarios that don't need real capture). Recording requires the
# real bytes, so switch to "computed" for this run only.
**.fcsMode = "computed"
**.crcMode = "computed"

*.coreClient.recordPcap = true
*.coreClient.pcapRecorder[*].fileFormat = "pcap"
*.coreClient.pcapRecorder[*].pcapFile = "${resultdir}/coreClient.pcap"

# --- SyncOnly: filter to gPTP frames only (INET's equivalent of a real
# `tcpdump -i eth0 ether proto 0x88f7` capture) -----------------------------
# First attempt set dumpProtocols="gptp" and produced a 0-byte file --
# confirmed empirically in CI. Root cause (from PcapRecorder.cc): a packet is
# recorded only if `dumpProtocols` AND `packetFilter` both pass; dumpProtocols
# checks the protocol tag exactly as it stands at the interface signal point,
# which for a fully-formed outgoing/incoming frame is the *outer* link-layer
# protocol ("ethernetmac", its own default) -- gPTP is the inner payload, so
# it never matches there, no matter which frames flow. Leave dumpProtocols at
# its inherited default (any real Ethernet frame passes that gate) and use
# `packetFilter` instead: INET's generic packet-content filter (cMatchExpression
# format, the same mechanism used across INET's packet visualizers/filters),
# via `expr(has(ChunkType))` matching the gPTP message chunk classes.
#
# This cuts data volume dramatically: gPTP's sync/pdelay traffic is a
# handful of messages per second, vanishingly small next to congestion.ini's
# ~18.75k pkt/s UDP background -- so unlike the General config above (which
# must stay under ~1s to avoid multi-hundred-MB files), SyncOnly is safe to
# run across the *entire* scenario duration, capturing exactly how sync/
# pdelay traffic behaves while congestion builds -- the actual research
# signal this project cares about, per the recording-policy principle
# ("gPTP ... stay fully recorded regardless of data-plane load").
[Config SyncOnly]
description = "gPTP-only pcap capture -- safe for the full scenario duration"
*.coreClient.pcapRecorder[*].packetFilter = "expr(has(GptpSync) or has(GptpFollowUp) or has(GptpPdelayReq) or has(GptpPdelayResp) or has(GptpPdelayRespFollowUp) or has(GptpAnnounce))"
*.coreClient.pcapRecorder[*].pcapFile = "${resultdir}/coreClient-sync.pcap"
