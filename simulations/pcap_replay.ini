# Replays a previously captured pcapng file back into the simulation as a
# traffic source, using INET's PcapFilePacketProducer -- proves the pcap
# capture/replay round-trip actually works (not just that the modules exist).
# Swaps clientsA[0]'s UdpSourceApp.source submodule for a PcapFilePacketProducer
# instead of the usual random/periodic generator, the same composition pattern
# feedback.ini already uses to swap in a clock-driven source: only the
# `source` submodule's typename/params change, the UdpSourceApp wrapper and
# UdpSinkApp at coreClient stay the same.
#
# Run scripts/run.sh General simulations/pcap_capture.ini results-pcap-capture
# BEFORE this config -- it reads that run's captured coreClient.pcapng.

[General]
include nominal.ini
sim-time-limit = 5s

*.clientsA[0].numApps = 1
*.clientsA[0].app[0].typename = "UdpSourceApp"
*.clientsA[0].app[0].io.destAddress = "coreClient"
*.clientsA[0].app[0].io.destPort = 9500
*.clientsA[0].app[0].source.typename = "PcapFilePacketProducer"
*.clientsA[0].app[0].source.filename = "results-pcap-capture/coreClient.pcapng"

*.coreClient.numApps = 1
*.coreClient.app[0].typename = "UdpSinkApp"
*.coreClient.app[0].io.localPort = 9500
